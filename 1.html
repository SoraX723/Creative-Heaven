<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
 
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
 
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <!-- Cambia el src por tu URL de imagen -->
  <img src="//raw.githubusercontent.com/SoraX723/Creative-Heaven/main/1.png" alt="">
</body>
</html>
